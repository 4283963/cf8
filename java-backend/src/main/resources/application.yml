server:
  port: 8080

spring:
  application:
    name: stray-animal-feeder

  datasource:
    url: jdbc:mysql://localhost:3306/stray_animal_feeder?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

feeder:
  default-food-amount-per-dispense: 10
  min-food-percentage-threshold: 5
  pest-lock-duration-seconds: 300
  pest-detection-threshold: 3
  pest-detection-window-seconds: 60
