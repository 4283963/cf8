server:
  port: 8080
  tomcat:
    threads:
      max: 100
      min-spare: 20
    max-connections: 200
    accept-count: 50
    connection-timeout: 3000

spring:
  application:
    name: stray-animal-feeder

  datasource:
    url: jdbc:mysql://localhost:3306/stray_animal_feeder?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: FeederHikariPool
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      idle-timeout: 60000
      max-lifetime: 1800000
      leak-detection-threshold: 10000
      validation-timeout: 3000
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: 2000ms
          max-idle: 10
          min-idle: 5
        shutdown-timeout: 100ms

  task:
    execution:
      pool:
        core-size: 16
        max-size: 64
        queue-capacity: 512
        keep-alive: 60s
        allow-core-thread-timeout: true
      thread-name-prefix: async-feeder-

feeder:
  default-food-amount-per-dispense: 10
  min-food-percentage-threshold: 5
  pest-lock-duration-seconds: 300
  pest-detection-threshold: 3
  pest-detection-window-seconds: 60

  rate-limit:
    ai-signal-per-feeder-per-second: 2.0
    ai-signal-global-per-second: 50.0
    burst-factor: 5

  circuit-breaker:
    failure-threshold-percentage: 50
    slow-call-threshold-percentage: 80
    slow-call-duration-seconds: 3
    wait-duration-in-open-state-seconds: 15
    permitted-number-of-calls-in-half-open-state: 3
    sliding-window-size: 50
    sliding-window-type: COUNT_BASED
    minimum-number-of-calls: 10

  async-signal-queue-capacity: 10000
